name: Feature Request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case. What are you trying to do and why is it hard?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Include examples, mockups, or CLI output.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you prefer the proposed solution.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Browser UI
        - CLI
        - Library API
        - YAML Rules
        - Documentation
        - Other
