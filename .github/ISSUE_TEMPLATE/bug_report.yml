name: Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. The more detail you provide, the faster we can fix it.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Browser UI
        - CLI
        - Library API
        - YAML Rules
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. Include error messages if any.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: |
        Minimal steps to trigger the bug. Include CLI commands, code snippets, or HAR file details.
      placeholder: |
        1. Run `npx har-o-scope analyze my-file.har`
        2. See error "..."
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of `npx har-o-scope --version`"
      placeholder: "0.1.0"

  - type: input
    id: node
    attributes:
      label: Node.js version
      description: "Output of `node --version`"
      placeholder: "v20.x.x"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15, Ubuntu 24.04, Windows 11"
